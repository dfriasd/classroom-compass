<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://nappgvkeodboaazejile.supabase.co/storage/v1/object/public/color-compass-assets/teacher-connect.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Color Compass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sun-yellow: #F7B32B;
            --earth-terracotta: #D64933;
            --sky-blue: #1E96FC;
            --leaf-green: #2D936C;
            --warm-cream: #FFF8F0;
            --deep-navy: #0A1628;
            --soft-shadow: rgba(10, 22, 40, 0.08);
            --danger: #dc3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Source Sans 3', -apple-system, sans-serif;
            background: var(--warm-cream);
            color: var(--deep-navy);
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(247, 179, 43, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(30, 150, 252, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 90%, rgba(214, 73, 51, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        h1, h2, h3 { font-family: 'Fraunces', Georgia, serif; font-weight: 600; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 248, 240, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(10, 22, 40, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--deep-navy);
        }

        .logo-icon {
    width: 60px;
    height: 60px;
    object-fit: contain;
}

        .logo-text { font-family: 'Fraunces', serif; font-size: 1.25rem; font-weight: 700; }

        .nav-links { display: flex; gap: 1.5rem; list-style: none; align-items: center; }

        .nav-links a, .nav-links button {
            text-decoration: none;
            color: var(--deep-navy);
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .nav-links a:hover, .nav-links button:hover { color: var(--earth-terracotta); }

        .nav-btn-logout {
            padding: 0.5rem 1.25rem !important;
            background: rgba(220, 53, 69, 0.1) !important;
            color: var(--danger) !important;
            border-radius: 25px !important;
            border: 1px solid rgba(220, 53, 69, 0.2) !important;
        }

        .nav-btn-logout:hover { 
            background: var(--danger) !important; 
            color: white !important; 
        }

        /* Main Content */
        .main-content {
            padding: 6rem 2rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Loading State */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 1.5rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(10, 22, 40, 0.1);
            border-top-color: var(--sky-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner-small {
            width: 20px;
            height: 20px;
            border-width: 2px;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Dashboard Header */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid rgba(10, 22, 40, 0.1);
        }

        .school-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .school-avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.75rem;
        }

        .school-avatar.us { background: linear-gradient(135deg, var(--sky-blue), var(--leaf-green)); }
        .school-avatar.global { background: linear-gradient(135deg, var(--sun-yellow), var(--earth-terracotta)); }

        .school-details h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .school-details p { color: rgba(10, 22, 40, 0.6); font-size: 0.9rem; }

        .access-code-badge {
            background: rgba(10, 22, 40, 0.05);
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            text-align: center;
        }

        .access-code-badge .label {
            font-size: 0.75rem;
            color: rgba(10, 22, 40, 0.5);
            margin-bottom: 0.25rem;
        }

        .access-code-badge .code {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--sky-blue);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(10, 22, 40, 0.1);
            padding-bottom: 0;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            color: rgba(10, 22, 40, 0.5);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover { color: var(--deep-navy); }
        .tab-btn.active { 
            color: var(--sky-blue); 
            border-bottom-color: var(--sky-blue);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 30px var(--soft-shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(10, 22, 40, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 { font-size: 1.1rem; }

        .card-body { padding: 1.5rem; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--earth-terracotta);
            color: white;
            box-shadow: 0 4px 20px rgba(214, 73, 51, 0.3);
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(214, 73, 51, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: white;
            color: var(--deep-navy);
            border: 2px solid rgba(10, 22, 40, 0.1);
        }

        .btn-secondary:hover { border-color: var(--sky-blue); color: var(--sky-blue); }

        .btn-success {
            background: var(--leaf-green);
            color: white;
            box-shadow: 0 4px 20px rgba(45, 147, 108, 0.3);
        }

        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(45, 147, 108, 0.4); }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        /* Status Badges */
        .status-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.matched {
            background: rgba(45, 147, 108, 0.1);
            color: var(--leaf-green);
        }

        .status-badge.waiting {
            background: rgba(247, 179, 43, 0.1);
            color: var(--sun-yellow);
        }

        .status-badge.us {
            background: rgba(30, 150, 252, 0.1);
            color: var(--sky-blue);
        }

        .status-badge.global {
            background: rgba(214, 73, 51, 0.1);
            color: var(--earth-terracotta);
        }

        /* Waiting State */
        .waiting-state {
            text-align: center;
            padding: 3rem 2rem;
        }

        .waiting-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, var(--sun-yellow), var(--earth-terracotta));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .waiting-state h2 { margin-bottom: 1rem; }
        .waiting-state p { color: rgba(10, 22, 40, 0.6); margin-bottom: 0.5rem; }

        /* Partner Schools Grid */
        .schools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .school-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px var(--soft-shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .school-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(10, 22, 40, 0.12);
        }

        .school-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .school-card h4 { font-size: 1.1rem; margin-bottom: 0.25rem; }
        .school-card .location { color: rgba(10, 22, 40, 0.6); font-size: 0.9rem; }

        .school-card-details {
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(10, 22, 40, 0.03);
            border-radius: 12px;
        }

        .school-card-details p {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .school-card-details p:last-child { margin-bottom: 0; }

        .school-card-details strong { color: var(--deep-navy); }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
        }

        @media (max-width: 1000px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        /* Messages Panel */
        .messages-panel {
            height: 600px;
            display: flex;
            flex-direction: column;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 18px;
            animation: messageIn 0.3s ease-out;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
            background: var(--sky-blue);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(10, 22, 40, 0.06);
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        .message.sent .message-meta { text-align: right; }

        .message-image {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .message-input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(10, 22, 40, 0.1);
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .message-input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid rgba(10, 22, 40, 0.1);
            border-radius: 24px;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            transition: border-color 0.2s;
        }

        .message-input:focus { outline: none; border-color: var(--sky-blue); }

        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: all 0.2s;
        }

        .icon-btn.send {
            background: var(--sky-blue);
            color: white;
        }

        .icon-btn.send:hover { background: #1380d8; }

        .icon-btn.upload {
            background: rgba(10, 22, 40, 0.05);
            color: var(--deep-navy);
        }

        .icon-btn.upload:hover { background: rgba(10, 22, 40, 0.1); }

        /* Sidebar */
        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

        .sidebar-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px var(--soft-shadow);
        }

        .sidebar-card h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .gallery-item:hover { transform: scale(1.05); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Partner Info */
        .partner-info-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(10, 22, 40, 0.05);
        }

        .partner-info-item:last-child { border-bottom: none; }
        .partner-info-label { color: rgba(10, 22, 40, 0.6); font-size: 0.9rem; }
        .partner-info-value { font-weight: 500; text-align: right; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: rgba(10, 22, 40, 0.5);
        }

        .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }

        /* Alerts */
        .alert {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-info {
            background: rgba(30, 150, 252, 0.1);
            color: var(--sky-blue);
            border: 1px solid rgba(30, 150, 252, 0.2);
        }

        .alert-success {
            background: rgba(45, 147, 108, 0.1);
            color: var(--leaf-green);
            border: 1px solid rgba(45, 147, 108, 0.2);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 250;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(10, 22, 40, 0.15);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: toastIn 0.3s ease-out;
            max-width: 350px;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast.success { border-left: 4px solid var(--leaf-green); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--sky-blue); }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 22, 40, 0.95);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 12px; }

        .lightbox-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Image Preview */
        .image-preview {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(10, 22, 40, 0.03);
            border-radius: 12px;
        }

        .image-preview img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .image-preview-info { flex: 1; }
        .image-preview-name { font-size: 0.85rem; font-weight: 500; }
        .image-preview-size { font-size: 0.75rem; color: rgba(10, 22, 40, 0.5); }

        .image-preview-remove {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.25rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content { padding: 5rem 1rem 2rem; }
            .dashboard-header { flex-direction: column; align-items: stretch; }
            .school-info { flex-direction: column; text-align: center; }
            .tabs { gap: 0; }
            .tab-btn { padding: 0.75rem 1rem; font-size: 0.9rem; }
            nav { padding: 0.75rem 1rem; }
            .nav-links { gap: 0.75rem; }
        }

        /* Registration Details Card */
        .registration-details {
            background: rgba(30, 150, 252, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .registration-details h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .registration-details p {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .registration-details p:last-child { margin-bottom: 0; }
    </style>
</head>

<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Navigation -->
    <nav>
        <a href="index.html" class="logo">
            <img src="https://nappgvkeodboaazejile.supabase.co/storage/v1/object/public/color-compass-assets/teacher-connect.png" alt="Color Compass" class="logo-icon">
            <span class="logo-text">Classroom Compass</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><button id="logout-btn" class="nav-btn-logout">Logout</button></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Loading State -->
        <div id="loading-state" class="loading-container">
            <div class="spinner"></div>
            <p>Loading your dashboard...</p>
        </div>

        <!-- Dashboard Content (hidden until loaded) -->
        <div id="dashboard-content" style="display: none;"></div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close">&times;</button>
        <img id="lightbox-img" src="" alt="Artwork">
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="image-upload" accept="image/*" style="display: none;">

    <script type="module">
        // ============================================
        // SUPABASE CONNECTION
        // ============================================
        
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        const SUPABASE_URL = 'https://nappgvkeodboaazejile.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable__tl6WQjLJU45lgA8w145xQ_ypOUfBxc';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================
        // APP STATE
        // ============================================
        
        let currentSchool = null;
        let partnerSchool = null;
        let messages = [];
        let allSchools = [];

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString([], { 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        // ============================================
        // AUTHENTICATION
        // ============================================

        async function checkAuth() {
            const schoolId = localStorage.getItem('current_school_id');
            const accessCode = localStorage.getItem('current_access_code');

            if (!schoolId || !accessCode) {
                // Not logged in, redirect to home
                window.location.href = 'teacher-connect.html';
                return false;
            }

            // Verify the session with Supabase
            const { data, error } = await supabase
                .from('tc_schools')
                .select('*')
                .eq('id', schoolId)
                .eq('access_code', accessCode)
                .single();

            if (error || !data) {
                // Invalid session, clear and redirect
                localStorage.removeItem('current_school_id');
                localStorage.removeItem('current_access_code');
                window.location.href = 'teacher-connect.html';
                return false;
            }

            currentSchool = data;
            return true;
        }

        function logout() {
            localStorage.removeItem('current_school_id');
            localStorage.removeItem('current_access_code');
            showToast('Logged out successfully', 'info');
            setTimeout(() => {
                window.location.href = 'teacher-connect.html';
            }, 500);
        }

        // ============================================
        // DATA LOADING
        // ============================================

        async function loadAllSchools() {
            const { data, error } = await supabase
                .from('tc_schools')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading schools:', error);
                return [];
            }

            allSchools = data || [];
            return allSchools;
        }

        async function loadPartnerSchool() {
            if (!currentSchool.partner_id) return null;

            const { data, error } = await supabase
                .from('tc_schools')
                .select('*')
                .eq('id', currentSchool.partner_id)
                .single();

            if (error) {
                console.error('Error loading partner:', error);
                return null;
            }

            partnerSchool = data;
            return partnerSchool;
        }

        async function loadMessages() {
            if (!currentSchool.partnership_id) return [];

            const { data, error } = await supabase
                .from('tc_messages')
                .select('*')
                .eq('partnership_id', currentSchool.partnership_id)
                .order('created_at', { ascending: true });

            if (error) {
                console.error('Error loading messages:', error);
                return [];
            }

            messages = data || [];
            return messages;
        }

        // ============================================
        // DASHBOARD RENDERING
        // ============================================

        function renderDashboard() {
            const container = document.getElementById('dashboard-content');

            container.innerHTML = `
                <!-- Dashboard Header -->
                <div class="dashboard-header">
                    <div class="school-info">
                        <div class="school-avatar ${currentSchool.school_type}">
                            ${currentSchool.school_type === 'us' ? '🇺🇸' : '🌍'}
                        </div>
                        <div class="school-details">
                            <h1>${escapeHtml(currentSchool.school_name)}</h1>
                            <p>${escapeHtml(currentSchool.teacher_name)} • ${escapeHtml(currentSchool.grade_level)} Grade • ${escapeHtml(currentSchool.country || currentSchool.state || '')}</p>
                        </div>
                    </div>
                    <div class="access-code-badge">
                        <div class="label">Your Access Code</div>
                        <div class="code">${currentSchool.access_code}</div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="overview">📊 Overview</button>
                    <button class="tab-btn" data-tab="messages" ${!hasPartner ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>💬 Messages</button>
                    <button class="tab-btn" data-tab="find-partners">🔍 Find Partners</button>
                </div>

                <!-- Tab Contents -->
                <div id="tab-overview" class="tab-content active">
                    ${renderOverviewTab(hasPartner)}
                </div>

                <div id="tab-messages" class="tab-content">
                    ${hasPartner ? renderMessagesTab() : '<div class="empty-state"><div class="empty-state-icon">💬</div><p>Get matched with a partner school to start messaging!</p></div>'}
                </div>

                <div id="tab-find-partners" class="tab-content">
                    ${renderFindPartnersTab()}
                </div>
            `;

            // Setup tab functionality
            setupTabs();
            
            // Setup message sending if we have a partner
            if (hasPartner) {
                setupMessageInput();
                scrollMessagesToBottom();
            }
        }

        function renderOverviewTab(hasPartner) {
            if (hasPartner) {
                // Show partnership dashboard
                const artworkMessages = messages.filter(m => m.image_url);
                
                return `
                    <div class="dashboard-grid">
                        <div class="card">
                            <div class="card-header">
                                <h3>🎨 Your Partnership</h3>

                            </div>
                            <div class="card-body">
                                <div class="school-info" style="margin-bottom: 1.5rem;">
                                    <div class="school-avatar ${partnerSchool.school_type}">

                                    </div>
                                    <div class="school-details">
                                        <h2 style="font-size: 1.25rem;">${escapeHtml(partnerSchool.school_name)}</h2>

            } else {

                        <div class="card-body">

                                <h2>Welcome, ${escapeHtml(currentSchool.school_name)}!</h2>
                                <p>You're registered and waiting to be matched with a partner school.</p>
                                <p>We'll notify you at <strong>${escapeHtml(currentSchool.teacher_email)}</strong> when you're matched!</p>
                                
                                <div style="margin-top: 2rem;">
                                    <button class="btn btn-primary" onclick="switchToTab('find-partners')">🔍 Browse Available Partners</button>
                                </div>

                                <div class="registration-details">
                                    <h3>📋 Your Registration Details</h3>
                                    <p><strong>School:</strong> ${escapeHtml(currentSchool.school_name)}</p>
                                    <p><strong>Teacher:</strong> ${escapeHtml(currentSchool.teacher_name)}</p>
                                    <p><strong>Grade Level:</strong> ${escapeHtml(currentSchool.grade_level)}</p>
                                    <p><strong>Location:</strong> ${escapeHtml(currentSchool.country || currentSchool.state || 'N/A')}</p>
                                    ${currentSchool.supply_needs ? `<p><strong>Supply Needs:</strong> ${escapeHtml(currentSchool.supply_needs)}</p>` : ''}

        function renderMessagesTab() {
            return `
                <div class="dashboard-grid">
                    <div class="card messages-panel">
                        <div class="card-header">
                            <h3>💬 Messages with ${escapeHtml(partnerSchool.school_name)}</h3>
                        </div>
                        <div class="messages-list" id="messages-list">
                            ${messages.length === 0 ? `
                                <div class="empty-state">
                                    <div class="empty-state-icon">👋</div>
                                    <p>No messages yet! Be the first to say hello.</p>
                                </div>
                            ` : messages.map(msg => renderMessage(msg)).join('')}
                        </div>
                        <div class="message-input-area">
                            <div class="message-input-wrapper">
                                <div id="image-preview-container"></div>
                                <textarea class="message-input" id="message-input" placeholder="Type a message..." rows="1"></textarea>
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="icon-btn upload" id="upload-btn" title="Upload artwork">📷</button>
                                <button class="icon-btn send" id="send-btn" title="Send message">➤</button>
                            </div>
                        </div>
                    </div>

                    <div class="sidebar">
                        <div class="sidebar-card">
                            <h3>🏫 Partner School Info</h3>
                            <div class="partner-info-item">
                                <span class="partner-info-label">School</span>
                                <span class="partner-info-value">${escapeHtml(partnerSchool.school_name)}</span>
                            </div>
                            <div class="partner-info-item">
                                <span class="partner-info-label">Location</span>
                                <span class="partner-info-value">${escapeHtml(partnerSchool.country || partnerSchool.state || 'N/A')}</span>
                            </div>
                            <div class="partner-info-item">
                                <span class="partner-info-label">Grade</span>
                                <span class="partner-info-value">${escapeHtml(partnerSchool.grade_level)}</span>
                            </div>
                            <div class="partner-info-item">
                                <span class="partner-info-label">Teacher</span>
                                <span class="partner-info-value">${escapeHtml(partnerSchool.teacher_name)}</span>
                            </div>
                            ${partnerSchool.supply_needs ? `
                                <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(10,22,40,0.1);">
                                    <span class="partner-info-label">Supply Needs</span>
                                    <p style="font-size: 0.9rem; margin-top: 0.5rem;">${escapeHtml(partnerSchool.supply_needs)}</p>
                                </div>
                            ` : ''}
                        </div>

                        ${messages.filter(m => m.image_url).length > 0 ? `
                            <div class="sidebar-card">
                                <h3>🖼️ Artwork Gallery</h3>
                                <div class="gallery-grid">
                                    ${messages.filter(m => m.image_url).slice(-6).map(msg => `
                                        <div class="gallery-item" onclick="openLightbox('${msg.image_url}')">
                                            <img src="${msg.image_url}" alt="Artwork">
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderMessage(msg) {
            const isSent = msg.sender_school_id === currentSchool.id;
            return `
                <div class="message ${isSent ? 'sent' : 'received'}">
                    ${msg.image_url ? `<img src="${msg.image_url}" alt="Shared artwork" class="message-image" onclick="openLightbox('${msg.image_url}')">` : ''}
                    ${msg.content ? `<p>${escapeHtml(msg.content)}</p>` : ''}
                    <div class="message-meta">
                        ${msg.student_first_name ? `From ${escapeHtml(msg.student_first_name)} • ` : ''}
                        ${formatDate(msg.created_at)}
                    </div>
                </div>
            `;
        }

        function renderFindPartnersTab() {
            // Filter schools that are not the current school and are potential partners
            const potentialPartners = allSchools.filter(school => {
                // Don't show self
                if (school.id === currentSchool.id) return false;
                // Only show opposite type (US schools see global, global see US)
                if (currentSchool.school_type === 'us') {
                    return school.school_type === 'global';
                } else {
                    return school.school_type === 'us';
                }
            });

            // Separate into available (no partner) and matched
            const availablePartners = potentialPartners.filter(s => !s.partner_id);
            const matchedPartners = potentialPartners.filter(s => s.partner_id);

            return `
                <div class="alert alert-info">
                    <span>ℹ️</span>
                    <span>You can browse potential partner schools below. ${currentSchool.school_type === 'us' ? 'As a US school, you can partner with Global schools.' : 'As a Global school, you can partner with US schools.'}</span>
                </div>

                <h3 style="margin-bottom: 1rem;">Available Partners (${availablePartners.length})</h3>
                
                ${availablePartners.length === 0 ? `
                    <div class="card">
                        <div class="card-body">
                            <div class="empty-state">
                                <div class="empty-state-icon">🔍</div>
                                <p>No available partners at the moment. Check back soon!</p>
                            </div>
                        </div>
                    </div>
                ` : `
                    <div class="schools-grid">
                        ${availablePartners.map(school => `
                            <div class="school-card">
                                <div class="school-card-header">
                                    <div>
                                        <h4>${escapeHtml(school.school_name)}</h4>
                                        <p class="location">${escapeHtml(school.country || school.state || 'Unknown')}</p>
                                    </div>
                                    <span class="status-badge ${school.school_type}">${school.school_type === 'us' ? '🇺🇸 US' : '🌍 Global'}</span>
                                </div>
                                <div class="school-card-details">
                                    <p><strong>Teacher:</strong> ${escapeHtml(school.teacher_name)}</p>
                                    <p><strong>Grade:</strong> ${escapeHtml(school.grade_level)}</p>
                                    ${school.supply_needs ? `<p><strong>Needs:</strong> ${escapeHtml(school.supply_needs)}</p>` : ''}
                                    ${school.interests ? `<p><strong>Interests:</strong> ${escapeHtml(school.interests)}</p>` : ''}
                                </div>
                                ${!currentSchool.partner_id ? `
                                    <button class="btn btn-success btn-sm" style="width: 100%;" onclick="requestPartnership('${school.id}')">
                                        🤝 Request Partnership
                                    </button>
                                ` : `
                                    <p style="text-align: center; color: rgba(10,22,40,0.5); font-size: 0.9rem;">You already have a partner</p>
                                `}
                            </div>
                        `).join('')}
                    </div>
                `}

                ${matchedPartners.length > 0 ? `
                    <h3 style="margin: 2rem 0 1rem;">Already Matched (${matchedPartners.length})</h3>
                    <div class="schools-grid">
                        ${matchedPartners.map(school => `
                            <div class="school-card" style="opacity: 0.7;">
                                <div class="school-card-header">
                                    <div>
                                        <h4>${escapeHtml(school.school_name)}</h4>
                                        <p class="location">${escapeHtml(school.country || school.state || 'Unknown')}</p>
                                    </div>
                                    <span class="status-badge matched">Matched</span>
                                </div>
                                <div class="school-card-details">
                                    <p><strong>Teacher:</strong> ${escapeHtml(school.teacher_name)}</p>
                                    <p><strong>Grade:</strong> ${escapeHtml(school.grade_level)}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            `;
        }

        // ============================================
        // TAB FUNCTIONALITY
        // ============================================

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.disabled) return;
                    
                    const tabName = btn.dataset.tab;
                    
                    // Update active tab button
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Update active tab content
                    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                    document.getElementById(`tab-${tabName}`).classList.add('active');

                    // Scroll messages if switching to messages tab
                    if (tabName === 'messages') {
                        setTimeout(scrollMessagesToBottom, 100);
                    }
                });
            });
        }

        // Make this globally accessible for button onclick
        window.switchToTab = function(tabName) {
            const btn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
            if (btn && !btn.disabled) {
                btn.click();
            }
        };

        // ============================================
        // MESSAGING FUNCTIONALITY
        // ============================================

        function setupMessageInput() {
            const sendBtn = document.getElementById('send-btn');
            const uploadBtn = document.getElementById('upload-btn');
            const messageInput = document.getElementById('message-input');
            const fileInput = document.getElementById('image-upload');

            if (sendBtn) {
                sendBtn.addEventListener('click', sendMessage);
            }

            if (messageInput) {
                messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }

            if (uploadBtn && fileInput) {
                uploadBtn.addEventListener('click', () => fileInput.click());
                fileInput.addEventListener('change', handleImageSelect);
            }
        }

        async function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const content = messageInput?.value.trim();

            if (!content || !currentSchool.partnership_id) return;

            const messageData = {
                partnership_id: currentSchool.partnership_id,
                sender_school_id: currentSchool.id,
                content: content,
                message_type: 'text',
                created_at: new Date().toISOString()
            };

            try {
                const { data, error } = await supabase
                    .from('tc_messages')
                    .insert([messageData])
                    .select();

                if (error) throw error;

                // Add to local messages and re-render
                if (data && data[0]) {
                    messages.push(data[0]);
                    const messagesList = document.getElementById('messages-list');
                    if (messagesList) {
                        // Remove empty state if it exists
                        const emptyState = messagesList.querySelector('.empty-state');
                        if (emptyState) emptyState.remove();
                        
                        messagesList.insertAdjacentHTML('beforeend', renderMessage(data[0]));
                        scrollMessagesToBottom();
                    }
                }

                messageInput.value = '';
                showToast('Message sent!', 'success');

            } catch (error) {
                console.error('Error sending message:', error);
                showToast('Failed to send message', 'error');
            }
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            // For now, show a toast that image upload would require additional setup
            showToast('Image upload requires storage setup. Text messages work!', 'info');
            event.target.value = '';
        }

        function scrollMessagesToBottom() {
            const messagesList = document.getElementById('messages-list');
            if (messagesList) {
                messagesList.scrollTop = messagesList.scrollHeight;
            }
        }

        // ============================================
        // PARTNERSHIP REQUESTS
        // ============================================

        window.requestPartnership = async function(partnerId) {
            if (currentSchool.partner_id) {
                showToast('You already have a partner school', 'error');
                return;
            }

            const partnerSchoolData = allSchools.find(s => s.id === partnerId);
            if (!partnerSchoolData) {
                showToast('School not found', 'error');
                return;
            }

            if (partnerSchoolData.partner_id) {
                showToast('This school already has a partner', 'error');
                return;
            }

            try {
                // Create partnership ID (UUID format)
                const partnershipId = crypto.randomUUID();

                // First, create the partnership record in tc_partnerships
                const partnerSchoolName = partnerSchoolData.school_name;
                const { error: partnershipError } = await supabase
                    .from('tc_partnerships')
                    .insert([{
                        id: partnershipId,
                        name: `${currentSchool.school_name} ↔ ${partnerSchoolName}`,
                        us_school_id: currentSchool.school_type === 'us' ? currentSchool.id : partnerId,
                        global_school_id: currentSchool.school_type === 'global' ? currentSchool.id : partnerId,
                        created_at: new Date().toISOString()
                    }]);

                if (partnershipError) throw partnershipError;

                // Update both schools with the partnership
                const { error: error1 } = await supabase
                    .from('tc_schools')
                    .update({ 
                        partner_id: partnerId, 
                        partnership_id: partnershipId 
                    })
                    .eq('id', currentSchool.id);

                if (error1) throw error1;

                const { error: error2 } = await supabase
                    .from('tc_schools')
                    .update({ 
                        partner_id: currentSchool.id, 
                        partnership_id: partnershipId 
                    })
                    .eq('id', partnerId);

                if (error2) throw error2;

                showToast('Partnership created successfully!', 'success');

                // Reload the page to show new partnership
                setTimeout(() => {
                    window.location.reload();
                }, 1000);

            } catch (error) {
                console.error('Error creating partnership:', error);
                showToast('Failed to create partnership', 'error');
            }
        };

        // ============================================
        // LIGHTBOX
        // ============================================

        window.openLightbox = function(imageUrl) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = imageUrl;
            lightbox.classList.add('active');
        };

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close')) {
                closeLightbox();
            }
        });

        // ============================================
        // INITIALIZATION
        // ============================================

        async function init() {
            // Check authentication
            const isAuthenticated = await checkAuth();
            if (!isAuthenticated) return;

            // Load data
            await Promise.all([
                loadAllSchools(),
                loadPartnerSchool(),
                loadMessages()
            ]);

            // Hide loading, show dashboard
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('dashboard-content').style.display = 'block';

            // Render dashboard
            renderDashboard();

            // Setup logout button
            document.getElementById('logout-btn').addEventListener('click', logout);

            showToast(`Welcome back, ${currentSchool.teacher_name}!`, 'success');
        }

        // Start the app
        init();
    </script>
